{% extends 'tom_common/base.html' %}
{% load django_bootstrap5 %}
{% block title %}Change password{% endblock %}
{% block content %}
<div class="content">
<form action="{% url 'admin-user-change-password' view.kwargs.pk %}" method="POST">
{% csrf_token %}
{% bootstrap_form form %}
  <button type="submit" class="btn btn-primary">
    Change Password
  </button>
</form>
</div>
{% endblock %}
