apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata: # kpt-merge: /helm-example
  name: helm-example
  annotations:
    config.kubernetes.io/local-config: "true"
    internal.kpt.dev/upstream-identifier: 'kustomize.config.k8s.io|Kustomization|default|helm-example'
resources:
  - ./rendered.yaml
patches:
  - target:
      annotationSelector: internal.kpt.dev/upstream-identifier
    patch: |-
      - op: remove
        path: /metadata/annotations/internal.kpt.dev~1upstream-identifier
