apiVersion: fn.kpt.dev/v1alpha1
kind: ApplyReplacements
metadata: # kpt-merge: /helm-example
  name: helm-example
  annotations:
    config.kubernetes.io/local-config: "true"
    internal.kpt.dev/upstream-identifier: 'fn.kpt.dev|ApplyReplacements|default|helm-example'
replacements:
  - source:
      kind: RenderHelmChart
      fieldPath: metadata.name
    targets:
      - select:
          kind: Kustomization
        fieldPaths:
          - metadata.name
        options:
          delimiter: "helm-"
          index: 1
      - select:
          kind: ApplyReplacements
        fieldPaths:
          - metadata.name
        options:
          delimiter: "helm-"
          index: 1
