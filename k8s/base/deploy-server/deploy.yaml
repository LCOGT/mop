# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata: # kpt-merge: /example
  # Name will be used as the value for the `app.kubernetes.io/component`
  # selector label and updated automatically by `kpt fn render`.
  # So no need to set those manually.
  name: server
  labels:
    app.kubernetes.io/component: server
  annotations:
    internal.kpt.dev/upstream-identifier: 'apps|Deployment|default|example'
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: server
    spec:
      securityContext:
        fsGroup: 100
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: specutils
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: astropy
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: xdg-home
          emptyDir:
            sizeLimit: 64Mi
        - name: static
          emptyDir:
            sizeLimit: 32Mi
      initContainers:
        - name: check-db-ready
          image: "postgres:14-alpine"
          command:
            - sh
            - -c
            - |
              until pg_isready --username=$DB_USER --dbname=$DB_NAME --host=$DB_HOST --port=$DB_PORT;
                do echo waiting for database;
                sleep 1;
                done;
          envFrom:
            - configMapRef:
                name: env
                optional: false
            - secretRef:
                name: env
                optional: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
        - name: apply-db-migrations
          image: "mop"
          command:
            - python
            - manage.py
            - migrate
            - --no-input
          envFrom:
            - configMapRef:
                name: env
                optional: false
            - secretRef:
                name: env
                optional: false
          env:
            - name: HOME
              value: "/xdg-home"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: false
            - name: specutils
              mountPath: /.specutils
              readOnly: false
            - name: astropy
              mountPath: /.astropy
              readOnly: false
            - name: xdg-home
              mountPath: /xdg-home
              readOnly: false
            - name: static
              mountPath: /static
              readOnly: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
      containers:
        - name: default
          image: "mop"
          command:
            - gunicorn
            - --bind=0.0.0.0:8080
            - --worker-class=gevent
            - --workers=$(GUNICORN_WORKERS)
            - --timeout=$(GUNICORN_TIMEOUT)
            - --access-logfile=-
            - --error-logfile=-
            - mop.wsgi
          ports:
            - name: gunicorn
              containerPort: 8080
              protocol: TCP
          env:
            - name: GUNICORN_WORKERS
              value: "2"
            - name: GUNICORN_TIMEOUT
              value: "300"
            - name: HOME
              value: "/xdg-home"
          envFrom:
            - configMapRef:
                name: env
                optional: false
            - secretRef:
                name: env
                optional: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: false
            - name: specutils
              mountPath: /.specutils
              readOnly: false
            - name: astropy
              mountPath: /.astropy
              readOnly: false
            - name: xdg-home
              mountPath: /xdg-home
              readOnly: false
            - name: static
              mountPath: /static
              readOnly: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
